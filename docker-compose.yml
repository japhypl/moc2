services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env.local
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      # Uncomment for Cloudflare Origin Certificate:
      # - ./certs:/etc/ssl:ro

volumes:
  caddy_data:
  caddy_config:
